<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Мои слова | Vocab Cards</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <script>
    (function() {
      var theme = localStorage.getItem('theme') || 'light';
      document.body.className = theme;
    })();
  </script>

  <div id="bg-animation">
    <div class="bg-circle c1"></div>
    <div class="bg-circle c2"></div>
    <div class="bg-circle c3"></div>
    <div class="bg-circle c4"></div>
  </div>

  <div id="app">
    <header>
      <div class="user-info">
        <i class="fa-solid fa-user"></i>
        <span id="user-name">Пользователь</span>
      </div>
      <div class="header-actions">
        <button id="theme-toggle" class="icon-btn">
            <i class="fa-solid fa-moon"></i>
        </button>
        <a href="settings.html" class="icon-btn" title="Настройки">
            <i class="fa-solid fa-gear"></i>
        </a>
        <a href="faq.html" class="icon-btn" title="Частые вопросы">
            <i class="fa-solid fa-circle-question"></i>
        </a>
        <button id="logout-btn" class="icon-btn" title="Выйти">
            <i class="fa-solid fa-right-from-bracket"></i>
        </button>
        </div>
    </header>

    <div class="main-layout">
      <section id="folders-panel" class="folders-panel">
        <div class="folders-header">
          <h2>Папки</h2>
          <button id="add-folder-btn" class="add-folder-btn">+ Добавить папку</button>
        </div>
        <div id="folders-list" class="folders"></div>
      </section>

      <section id="folder-view" class="folder-view hidden">
        <div class="folder-view-header">
          <button id="back-to-folders-btn" class="icon-btn"><i class="fa-solid fa-arrow-left"></i> Назад</button>
          <h2 id="folder-view-title">Карточки</h2>
        </div>

        <!-- Основная панель с кнопками -->
        <div id="folder-actions-bar" class="folder-actions-bar">
          <div class="actions-row">
            
            <button id="add-card-btn" class="action-btn">
              <i class="fa-solid fa-plus"></i> Добавить
            </button>
            <button id="import-btn" class="action-btn">
              <i class="fa-solid fa-file-import"></i> Импорт
            </button>
            <button id="deduplicate-btn" class="action-btn">
              <i class="fa-solid fa-clone"></i> Дубликаты
            </button>
            <button id="start-study-btn" class="start-btn">
              <i class="fa-solid fa-play"></i> Начать обучение
            </button>
          </div>
        </div>

        <!-- Настройки обучения (теперь всегда видны) -->
        <div id="study-settings" class="study-settings">
          <label class="setting-item">
            <input type="checkbox" id="shuffle-checkbox" checked>
            <span>Перемешивать</span>
          </label>
          <label class="setting-item">
            <span>Показывать первым:</span>
            <select id="show-first-select">
              <option value="term">Изучаемый</option>
              <option value="translation">Родной</option>
            </select>
          </label>
        </div>

        <!-- Панель обучения (показывается только во время обучения) -->
        <div id="study-actions-bar" class="study-actions-bar hidden">
          <span id="study-progress-top" class="study-progress-text">Осталось: 0</span>
          <button id="restart-study-top-btn" class="icon-btn">
            <i class="fa-solid fa-rotate"></i> Начать сначала
          </button>
        </div>

        <!-- Сетка карточек -->
        <div id="cards-grid" class="cards-grid"></div>

        <!-- Режим обучения -->
        <div id="study-view" class="study-view hidden">
          <div class="study-card" id="study-card">
            <div class="study-card-inner">
              <div class="study-front">
                <p id="study-term-text"></p>
                <i class="fa-solid fa-volume-high speech-btn" id="speak-current"></i>
              </div>
              <div class="study-back">
                <p id="study-translation-text"></p>
                <i class="fa-solid fa-volume-high speech-btn" id="speak-translation-current"></i>
              </div>
            </div>
          </div>
          <div class="study-controls">
            <button id="forgot-btn" class="study-btn forgot"><i class="fa-solid fa-xmark"></i> Не запомнил</button>
            <button id="remembered-btn" class="study-btn remembered"><i class="fa-solid fa-check"></i> Запомнил</button>
          </div>
        </div>
      </section>
    </div>

    <!-- Модальные окна остаются без изменений, только добавлен венгерский -->
    <div id="folder-modal" class="modal hidden">
      <div class="modal-content">
        <span class="close-modal">&times;</span>
        <h3 id="folder-modal-title">Новая папка</h3>
        <form id="folder-form">
          <input type="text" id="folder-name" placeholder="Название папки" required>
          <select id="folder-language">
            <option value="en">English</option>
            <option value="pl">Polski</option>
            <option value="de">Deutsch</option>
            <option value="fr">Français</option>
            <option value="hu">Magyar</option>
            <option value="ja">日本語</option>
            <option value="ko">한국어</option>
            <option value="ru">Русский</option>
          </select>
          <input type="hidden" id="folder-id" value="">
          <button type="submit">Сохранить</button>
        </form>
      </div>
    </div>

    <div id="card-modal" class="modal hidden">
      <div class="modal-content">
        <span class="close-modal">&times;</span>
        <h3 id="modal-title">Новая карточка</h3>
        <form id="card-form">
          <input type="text" id="card-term" placeholder="Слово / фраза" required>
          <input type="text" id="card-translation" placeholder="Перевод" required>
          <input type="hidden" id="card-id" value="">
          <button type="submit">Сохранить</button>
        </form>
      </div>
    </div>

    <div id="import-text-modal" class="modal hidden">
      <div class="modal-content" style="max-width: 600px;">
        <span class="close-modal">&times;</span>
        <h3><i class="fa-solid fa-file-import"></i> Импорт списка слов</h3>
        <p>Формат: слово - перевод (разделители: тире, двоеточие, строки через Enter или ;)</p>
        <textarea id="import-textarea" rows="8" placeholder="apple - яблоко&#10;cat - кот&#10;dog – собака" style="width:100%; margin-bottom:0.5rem;"></textarea>
        <button id="parse-import-btn">Разобрать</button>
        <div id="import-preview-list" style="margin:1rem 0; max-height: 300px; overflow-y: auto;"></div>
        <button id="confirm-import-btn" disabled>Добавить все карточки</button>
      </div>
    </div>
  </div>

  <script>
    if (!localStorage.getItem('token')) {
      window.location.href = 'login.html';
    }
    (function() {
      var theme = localStorage.getItem('theme') || 'light';
      document.documentElement.className = theme;
      document.body.className = theme;
    })();

    window.appSettings = null; // будет загружено позже

    // Добавить в app.js:
    window.addEventListener('pageshow', () => {
        loadUserSettings(); // перезагружаем при возврате из settings
    });

    window.addEventListener('storage', (e) => {
  if (e.key === 'appSettings' && e.newValue) {
    window.appSettings = JSON.parse(e.newValue);
    // Дополнительно: обновить speechEnabled в реальном времени
    if (typeof window.updateSpeech === 'function') window.updateSpeech();
  }
});
  </script>

  <script type="module" src="js/modal.js"></script>
  <script type="module" src="js/speech.js"></script>
  <script type="module" src="js/folders.js"></script>
  <script type="module" src="js/cards.js"></script>
  <script type="module" src="js/study.js"></script>
  <script type="module" src="js/import-text.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
