<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход | Vocab Cards</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <script>
    // Мгновенно применяем сохранённую тему
    (function() {
      var theme = localStorage.getItem('theme') || 'light';
      document.body.className = theme;
    })();
  </script>
  <div class="auth-container">
    <h2><i class="fa-solid fa-right-to-bracket"></i> Вход</h2>
    <form id="login-form">
      <input type="text" id="login-username" placeholder="Логин" required autocomplete="username">
      <div class="password-wrapper">
        <input type="password" id="login-password" placeholder="Пароль" required autocomplete="current-password">
        <i class="fa-solid fa-eye-slash toggle-password" data-target="login-password"></i>
      </div>
      <button type="submit">Войти</button>
    </form>
    <p>Нет аккаунта? <a href="register.html">Зарегистрироваться</a></p>
    <div id="error-message" class="error"></div>
  </div>
  <script type="module" src="js/auth.js"></script>
</body>
</html>
